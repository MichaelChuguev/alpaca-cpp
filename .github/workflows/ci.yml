name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: g++
            cc: gcc
            cxx: g++
          - os: ubuntu-latest
            compiler: clang++
            cc: clang
            cxx: clang++
          - os: macos-latest
            compiler: clang++
            cc: clang
            cxx: clang++

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / ${{ matrix.compiler }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev nlohmann-json3-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake openssl nlohmann-json

      - name: Install Howard Hinnant date
        run: |
          git clone --depth 1 https://github.com/HowardHinnant/date.git /tmp/date
          cmake -S /tmp/date -B /tmp/date/build \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DBUILD_TZ_LIB=OFF \
            -DUSE_SYSTEM_TZ_DB=ON
          cmake --build /tmp/date/build
          sudo cmake --install /tmp/date/build

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DALPACA_BUILD_TESTS=ON \
            -DALPACA_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build -j $(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure
